<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables Using Nested Loops</title>
</head>
<body>
    <h1>Please see the console</h1>

    <script>
        for (let i = 2; i <= 3; i++) {
            console.log("Table of " + i);

            for (let j = 1; j <= 10; j++) {
                console.log(i + " x " + j + " = " + (i * j));
            }

            console.log("----------------");
        }
    </script>
</body>
</html>
