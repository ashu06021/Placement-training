<!DOCTYPE html>
<html>
<head>
    <title>AI Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">

        <h1>🤖 AI Assistant</h1>

        <div id="chatBox"></div>

        <div class="input-area">

            <input
                type="text"
                id="userInput"
                placeholder="Ask something..."
            >

            <button id="sendBtn">
                Send
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
