<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>
</head>
<body>
<center>
    <form>
        <h2>Basic Input form </h2>
        name : <input placeholder="enter name" type =" text"> <required> <br> <br>
        email : <input placeholder="enter your email" type =" email"> <required>  <br> <br>
        password : <input placeholder="enter your password" type =" password"> <required>  <br> <br>

        <button> submit </button>
    </form>
</center>
<hr>
<h3> some more input types </h3>
what is your gender ? 
 <label> <input type="radio" name="gender" value="male"> Male </label>
<input type="radio" name="gender" value="female"> Female
<input type="radio" name="gender" value="other"> Other 
<br> <hr> 

<h4> check box </h4>
Select your hobbies :
<label> <input type="checkbox" name="hobby" value="reading"> Reading </label>
<input type="checkbox" name="hobby" value="travelling"> Travelling      
<input type="checkbox" name="hobby" value="cooking"> Cooking
<input type="checkbox" name="hobby" value="sports"> Sports      
<hr>
<select>
    <option value=""> select your country </option>
    <option value="india"> India </option>
    <option value="usa"> USA </option>
    <option value="uk"> UK </option>
    <option value="australia"> Australia </option>
    <option value="other"> Other </option>
</select>  
    <br>

    <p>in case of other city : <input placeholder="enter your city "> </p>
</body>
</html>
